// --- SEMUA LOGIK JAVASCRIPT DIKEKALKAN SEPERTI ASAL ---
function bukaGambar(src) {
    document.getElementById("imgZoomed").src = src;
    document.getElementById("imgOverlay").style.display = "flex";
}

function tutupGambar() {
    document.getElementById("imgOverlay").style.display = "none";
}

let currentRating = 0;
function rate(n) {
    currentRating = n;
    const stars = document.querySelectorAll('#starGroup span');
    stars.forEach((s, i) => {
        if (i < n) { s.classList.add('active'); } 
        else { s.classList.remove('active'); }
    });
}

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtDBvrISdwgAGR-W90BqP58R_uAg3vzDevWqdCxQ5MNcY2DVDBoIE7u56hNWgrQfwZ/exec";

async function muatTurunKomen() {
    try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        const box = document.getElementById('displayKomen');
        const filteredData = data.filter(item => item.rumahId == (id || "umum"));

        if (filteredData.length > 0) {
            const noComment = document.getElementById('noCommentText');
            if(noComment) noComment.remove();
            box.innerHTML = ""; 
            filteredData.reverse().forEach(item => {
                tambahKomenKePaparan(item.nama, item.komen, item.rating, "Sudah disimpan");
            });
        }
    } catch (error) {
        console.error("Gagal memuat turun komen:", error);
    }
}

async function hantarKomen() {
    const name = document.getElementById('userName').value;
    const text = document.getElementById('userComment').value;
    if(!name || !text || currentRating === 0) {
        return alert("Sila isi nama, rating dan komen!");
    }
    const btn = document.querySelector('.btn-hantar');
    btn.innerText = "Menghantar...";
    btn.disabled = true;
    try {
        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ rumahId: id || "umum", nama: name, rating: currentRating, komen: text })
        });
        alert("Terima kasih! Review anda telah disimpan.");
        location.reload();
    } catch (error) {
        alert("Maaf, gagal menghantar komen.");
        btn.innerText = "Hantar Review";
        btn.disabled = false;
    }
}

function tambahKomenKePaparan(name, text, rating, date) {
    const box = document.getElementById('displayKomen');
    let starsHtml = "";
    for(let i=0; i<5; i++) {
        starsHtml += i < rating ? "★" : "<span style='color:#dadce0'>★</span>";
    }
    const entry = document.createElement('div');
    entry.className = 'comment-card';
    entry.innerHTML = `
        <div class="user-header">
            <div class="user-avatar">${name.charAt(0)}</div>
            <div class="user-info-text">
                <div class="user-name">${name}</div>
                <div class="comment-date">${date}</div>
            </div>
        </div>
        <div class="star-rating-display">${starsHtml}</div>
        <div class="comment-body">${text}</div>
    `;
    box.appendChild(entry);
}
muatTurunKomen();
